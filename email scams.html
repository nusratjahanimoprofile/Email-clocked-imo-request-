<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইমুতে যুক্ত হোন</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .card h1 {
            color: #333333;
            font-size: 24px;
            margin-bottom: 15px;
        }
        .card p {
            color: #666666;
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .send-btn {
            display: inline-block;
            background-color: #0088cc; /* ইমুর কাছাকাছি একটি নীল রঙ */
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 136, 204, 0.2);
            width: 100%;
        }
        .send-btn:hover {
            background-color: #006699;
            transform: translateY(-2px);
        }
        .send-btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>ইমুতে এড হতে চাই</h1>
        <p>নিচের বাটনে ক্লিক করলে আপনার ইমেইল অ্যাপটি ওপেন হবে। সরাসরি সেখান থেকে মেইলটি সেন্ড করুন।</p>
        
        <!-- এই বাটনে ক্লিক করলে ইমেইল পাঠানোর প্রক্রিয়া শুরু হবে -->
        <button class="send-btn" onclick="sendEmail()">Send (সেন্ড করুন)</button>
    </div>

    <script>
        function sendEmail() {
            // প্রাপকের ইমেইল ঠিকানা
            const toEmail = "shimakhatun00990@gmail.com";
            
            // ইমেইলের বিষয় (Subject)
            const subject = "ইমুতে যুক্ত হওয়ার অনুরোধ";
            
            // ইমেইলের ভেতরের লেখা (Body)
            const body = "হ্যালো,\n\nআমি আপনার সাথে ইমুতে যুক্ত হতে চাই। দয়া করে আমাকে আপনার ইমুতে যুক্ত করে নিন।\n\nধন্যবাদ।";
            
            // URL এনকোডিং করা হচ্ছে যাতে বাংলা টেক্সট সঠিকভাবে ইমেইল অ্যাপে দেখায়
            const mailtoUrl = `mailto:${toEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            
            // ব্যবহারকারীর মেইল ক্লায়েন্ট বা অ্যাপ ওপেন করার নির্দেশ
            window.location.href = mailtoUrl;
        }
    </script>

</body>
</html>
